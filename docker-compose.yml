# ─── Volumes ──────────────────────────────────────────────────────────────────

volumes:
  node-p0-r0-data:
  node-p0-r1-data:
  node-p0-r2-data:
  node-p1-r0-data:
  node-p1-r1-data:
  node-p1-r2-data:
  node-p2-r0-data:
  node-p2-r1-data:
  node-p2-r2-data:

# ─── Networks ─────────────────────────────────────────────────────────────────

networks:
  db-net:
    driver: bridge
