      PARTITION_ID: "2"
      PARTITION_COUNT: "3"
      REPLICA_COUNT: "3"
      SELF_ADDR: "node-p2-r2:7000"
      PEERS: "node-p2-r0:7000,node-p2-r1:7000"
      DATA_DIR: "/data"
      RPC_PORT: "7000"
      SNAPSHOT_THRESHOLD: "1000"
      ELECTION_TIMEOUT_MIN_MS: "150"
      ELECTION_TIMEOUT_MAX_MS: "300"
      HEARTBEAT_INTERVAL_MS: "50"
    ports:
      - "7022:7000"
    volumes:
